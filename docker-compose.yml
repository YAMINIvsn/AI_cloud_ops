version: '3.9'

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - cloudops-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - cloudops-net

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml
    networks:
      - cloudops-net

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=cloudops123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      # Auto-provision datasource and dashboard on startup
      - ./monitoring/grafana-datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml
      - ./monitoring/grafana-dashboard-provisioning.yml:/etc/grafana/provisioning/dashboards/cloudops.yml
      - ./monitoring/grafana-dashboard.json:/etc/grafana/provisioning/dashboards/cloudops-dashboard.json
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - cloudops-net

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: cloudops
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: cloudops_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cloudops-net

volumes:
  postgres_data:
  grafana_data:

networks:
  cloudops-net:
    driver: bridge