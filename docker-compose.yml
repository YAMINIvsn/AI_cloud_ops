version: '3.9'

services:
  router-agent:
    build:
      context: .
      dockerfile: docker/router-agent.Dockerfile

    ports:
      - "8000:8000"

  operations-agent:
    build:
      context: .
      dockerfile: docker/router-agent.Dockerfile

    ports:
      - "8001:8000"

  prometheus:
    image: prom/prometheus

    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana

    ports:
      - "3000:3000"